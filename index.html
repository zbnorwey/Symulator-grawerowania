<!DOCTYPE html>
<html lang="pl">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@700&family=Dancing+Script:wght@700&family=Roboto+Mono:wght@700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grawer Mobilny</title>
    <style>
        :root { 
            --bg-color: #0f172a; 
            --panel-color: #1e293b; 
            --accent-color: #38bdf8; 
            --error-color: #ef4444; 
        }

        body { 
            background-color: var(--bg-color); 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px; /* Szerokość typowego smartfona */
        }

        .card {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .input-group { margin-bottom: 12px; }
        
        label { 
            display: block;
            font-size: 10px; 
            text-transform: uppercase; 
            color: #94a3b8; 
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        textarea, input, select {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px; /* 16px zapobiega auto-zoomowi na iOS */
        }

        /* Stylizacja suwaków (Thumb musi być duży dla palca) */
        input[type=range] {
            height: 30px;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--accent-color);
            -webkit-appearance: none;
            margin-top: -8px;
        }

        #canvas-wrapper {
            width: 100%;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            border: 3px solid #334155;
            margin-top: 10px;
            touch-action: none; /* Zapobiega przewijaniu strony podczas dotykania canvasu */
        }

        canvas {
            width: 100% !important; /* Canvas skaluje się do szerokości ekranu */
            height: auto !important;
            display: block;
        }

        .alert {
            color: var(--error-color);
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <div class="input-group">
            <label>Treść graweru</label>
            <textarea id="textInput" spellcheck="false">Grawer&#10;Mobilny</textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <label>Szerokość (mm)</label>
                <input type="number" id="widthMM" value="100">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Wysokość (mm)</label>
                <input type="number" id="heightMM" value="60">
            </div>
        </div>

        <div class="input-group">
            <label>Materiał</label>
            <select id="fontSelect">
                <option value="'Roboto Mono', monospace">Techniczna (Maszynowa)</option>
                <option value="'Orbitron', sans-serif">Futurystyczna (Laser)</option>
                <option value="'Cinzel', serif">Klasyczna Rzymska (Kamień/Metal)</option>
                <option value="'Dancing Script', cursive">Ozdobna (Biżuteria)</option>
                <option value="'Playfair Display', serif">Elegancka (Kursywa)</option>
            </select>

            <select id="materialSelect">
                <option value="steel">Stal szczotkowana</option>
                <option value="brass">Złoty mosiądz</option>
                <option value="aluminum">Aluminium</option>
            </select>
        </div>

        <div class="input-group">
            <label>Wysokość czcionki: <span id="mmLabel" style="color:var(--accent-color)">10 mm</span></label>
            <input type="range" id="sizePX" min="10" max="150" value="40">
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="engraveCanvas"></canvas>
    </div>
    <div id="alert" class="alert">⚠️ PROJEKT WYKRACZA POZA MATERIAŁ!</div>
</div>

<script>
    const canvas = document.getElementById('engraveCanvas');
    const ctx = canvas.getContext('2d');
    const PX_PER_MM = 6; // Wyższa gęstość dla lepszej jakości na ekranach Retina/OLED

    const materials = {
        steel: { surface: '#64748b', groove: '#0f172a', grain: 0.2 },
        brass: { surface: '#fbbf24', groove: '#451a03', grain: 0.15 },
        aluminum: { surface: '#cbd5e1', groove: '#475569', grain: 0.05 }
    };

    function draw() {
        const w = parseInt(document.getElementById('widthMM').value) || 50;
        const h = parseInt(document.getElementById('heightMM').value) || 20;
        const fontSize = parseInt(document.getElementById('sizePX').value);
        const mat = materials[document.getElementById('materialSelect').value];
        const text = document.getElementById('textInput').value;

        canvas.width = w * PX_PER_MM;
        canvas.height = h * PX_PER_MM;

        // Tło
        ctx.fillStyle = mat.surface;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Tekstura
        if (mat.grain > 0) {
            ctx.strokeStyle = `rgba(255,255,255,${mat.grain})`;
            for(let i=0; i < canvas.height; i += 4) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        // Tekst
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = mat.groove;

        const lines = text.split('\n');
        const lineHeight = fontSize * 1.2;
        const totalHeight = lines.length * lineHeight;
        let startY = (canvas.height / 2) - (totalHeight / 2) + (lineHeight / 2);

        let overflow = (totalHeight > canvas.height);

        lines.forEach((line, index) => {
            const y = startY + (index * lineHeight);
            if (ctx.measureText(line).width > canvas.width * 0.98) overflow = true;
            
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetY = 2;
            ctx.fillText(line, canvas.width / 2, y);
        });

        document.getElementById('mmLabel').innerText = (fontSize / PX_PER_MM).toFixed(1) + " mm";
        document.getElementById('alert').style.display = overflow ? 'block' : 'none';
        document.getElementById('canvas-wrapper').style.borderColor = overflow ? '#ef4444' : '#334155';
    }

    document.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('input', draw);
    });

    draw();
</script>

</body>
</html>
