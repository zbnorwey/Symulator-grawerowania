<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grawer Pro - Total Font Library</title>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --acc: #38bdf8; --plt: #f59e0b; }
        body { background: var(--bg); color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; }
        .card { background: var(--panel); padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 10px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; font-weight: bold; margin-bottom: 5px; }
        textarea, input, select { width: 100%; box-sizing: border-box; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; font-size: 16px; margin-bottom: 10px; outline: none; }
        
        /* Styl wyszukiwarki i statusu */
        .status-msg { font-size: 11px; color: var(--acc); margin-bottom: 10px; display: block; text-align: center; }
        
        #canvas-wrapper { width: 100%; background: #000; border-radius: 12px; border: 3px solid #334155; overflow: hidden; }
        canvas { width: 100% !important; height: auto !important; display: block; }
        
        .btn-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button.action { padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <label>Tekst graweru</label>
        <textarea id="textInput" oninput="draw()">Grawer 2026</textarea>

        <label>Wybierz czcionkę (Top Google Fonts)</label>
        <select id="fontPicker" onchange="changeFont(this.value)">
            <option value="Sacramento">Vanessa (Sacramento)</option>
            <option value="Roboto">Roboto (Standard)</option>
            <option value="Open Sans">Open Sans</option>
            <option value="Lato">Lato</option>
            <option value="Montserrat">Montserrat</option>
            <option value="Oswald">Oswald</option>
            <option value="Pacifico">Pacifico (Pisanka)</option>
            <option value="Lobster">Lobster</option>
            <option value="Anton">Anton (Gruba)</option>
            <option value="Dancing Script">Dancing Script</option>
            <option value="Playfair Display">Playfair Display</option>
            <option value="Cinzel">Cinzel (Rzymska)</option>
            <option value="Bangers">Bangers (Komiks)</option>
            <option value="Orbitron">Orbitron (Modern)</option>
            <option value="Permanent Marker">Marker</option>
        </select>

        <label>Lub wpisz dowolną nazwę z Google Fonts</label>
        <input type="text" id="customFont" placeholder="Np. MedievalSharp, Spookman..." onchange="changeFont(this.value)">
        <span id="fontStatus" class="status-msg">Gotowy</span>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>Szer. (mm)</label><input type="number" id="widthMM" value="80" oninput="draw()"></div>
            <div style="flex:1"><label>Wys. (mm)</label><input type="number" id="heightMM" value="50" oninput="draw()"></div>
        </div>
        
        <label>Rozmiar: <span id="mmLabel">12 mm</span></label>
        <input type="range" id="sizePX" min="10" max="300" value="60" oninput="draw()" style="width:100%">
    </div>

    <div id="canvas-wrapper"><canvas id="engraveCanvas"></canvas></div>
    
    <div class="btn-box">
        <button class="action" style="background:#334155; color:white" onclick="downloadPNG()">PNG</button>
        <button class="action" style="background:var(--plt); color:white" onclick="exportPLT()">PLIK PLT</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('engraveCanvas');
    const ctx = canvas.getContext('2d');
    let currentFont = "Sacramento";

    // Funkcja dynamicznie ładująca czcionki
    function changeFont(fontName) {
        if (!fontName) return;
        document.getElementById('fontStatus').innerText = "Ładowanie: " + fontName + "...";
        
        WebFont.load({
            google: { families: [fontName] },
            active: function() {
                currentFont = fontName;
                document.getElementById('fontStatus').innerText = "Czcionka aktywna: " + fontName;
                draw();
            },
            inactive: function() {
                document.getElementById('fontStatus').innerText = "Nie znaleziono czcionki. Używam standardowej.";
                currentFont = "sans-serif";
                draw();
            }
        });
    }

    function draw() {
        const wMM = parseInt(document.getElementById('widthMM').value) || 50;
        const hMM = parseInt(document.getElementById('heightMM').value) || 20;
        const fontSize = parseInt(document.getElementById('sizePX').value);
        const text = document.getElementById('textInput').value;

        canvas.width = wMM * 5;
        canvas.height = hMM * 5;
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = `${fontSize}px "${currentFont}"`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#ffffff";
        
        const lines = text.split('\n');
        const spacing = fontSize * 1.2;
        let y = (canvas.height / 2) - ((lines.length - 1) * spacing / 2);

        lines.forEach(line => {
            ctx.fillText(line, canvas.width / 2, y);
            y += spacing;
        });

        document.getElementById('mmLabel').innerText = (fontSize / 5).toFixed(1) + " mm";
    }

    function exportPLT() {
        const wMM = document.getElementById('widthMM').value;
        const hMM = document.getElementById('heightMM').value;
        const sizeMM = document.getElementById('sizePX').value / 5;
        const lines = document.getElementById('textInput').value.split('\n');
        
        let plt = "IN;DF;PS0;SP1;";
        lines.forEach((line, i) => {
            let y = (hMM / 2) + ((lines.length * sizeMM) / 2) - (i * sizeMM * 1.3) - sizeMM;
            plt += `PU${Math.round(wMM*0.2*40)},${Math.round(y*40)};SI${(sizeMM/10).toFixed(3)},${(sizeMM/10).toFixed(3)};LB${line}\x03;`;
        });
        
        const blob = new Blob([plt + "PU0,0;EC;"], {type: 'application/octet-stream'});
        const link = document.createElement('a');
        link.download = 'GRAW.PLT';
        link.href = URL.createObjectURL(blob);
        link.click();
    }

    function downloadPNG() {
        const link = document.createElement('a');
        link.download = 'podglad.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    // Start z czcionką Vanessa
    window.onload = () => { changeFont('Sacramento'); };
</script>
</body>
</html>
